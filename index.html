<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Para Ti</title>

<style>
body {
    margin: 0;
    background: #e9dccf;
    font-family: Arial, sans-serif;
    overflow: hidden;
}
/* imagen final */
.imagenFinal {
    width: 100%;
    max-width: 400px;
    border-radius: 15px;

}

/* PANTALLAS */
.pantalla {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    transition: opacity 0.8s ease;
}

.activa {
    display: flex;
}

/* INICIO */
.inicio {
    flex-direction: column;
    cursor: pointer;
}

/* IMAGEN GIRASOL */
.girasolImg {
    width: 120px;
    margin-bottom: 10px;
    cursor: pointer;
    animation: latido 1.5s infinite;
    transition: transform 0.3s ease;
}

.girasolImg:hover {
    transform: scale(1.15);
}

/* ANIMACIÓN LATIDO */
@keyframes latido {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.textoInicio {
    font-size: 18px;
    color: #6b4f3a;
    text-decoration: underline;
}

/* CONTENIDO */
.contenido {
    justify-content: center;
    gap: 40px; /* espacio entre texto e imagen */
    padding: 40px;
    opacity: 0;
}

/* TEXTO */
.texto {
    width: 40%;
    color: #333;
    font-size: 18px;
    line-height: 1.6;
}

#contador {
    margin-top: 20px;
    font-weight: bold;
}

/* ESCENA */
.escena {
    position: relative;
    width: 400px;
    height: 400px;
}

/* GIRASOLES */
.flor {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #5a3e2b 30%, gold 31%);
    box-shadow: 0 0 6px #ffd700;
}

.tablero {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    width: 350px;
}

/* NOTAS */
.nota {
    background: #fff8c6;
    padding: 15px;
    width: 150px;
    border-radius: 10px;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
    transform: rotate(-2deg);
    font-family: 'Comic Sans MS', cursive;
    position: relative;
}

.nota:nth-child(even) {
    transform: rotate(2deg);
}






</style>
</head>

<body>

<!-- INICIO -->
<div class="pantalla inicio activa" onclick="entrar()">
    <img src="gira.png" class="girasolImg">
    <div class="textoInicio">Flores Para Ti</div>
</div>

<!-- CONTENIDO -->
<div class="pantalla contenido" id="contenido">

    <div class="texto">
        <p><b>Flores Amarillas para el<br>amor de mi vida:</b></p>

        <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>

        <p>Cuanto más tiempo estoy contigo mejor.</p>

        <div id="contador"></div>
    </div>

	<!-- NUEVA NOTA -->
	<div class="nota">
        <p><b>12/11/2025</b></p>
        <p>Criaturita de mi corazón, este será el diario de mi amor 💛</p>
    </div>

    <div class="escena">
    <img src="fondo2.png" class="imagenFinal">
    </div>

</div>

<script>

// ENTRAR CON TRANSICIÓN
function entrar() {
    let inicio = document.querySelector(".inicio");
    let contenido = document.getElementById("contenido");

    inicio.style.opacity = "0";

    setTimeout(() => {
        inicio.classList.remove("activa");
        contenido.classList.add("activa");

        setTimeout(() => {
            contenido.style.opacity = "1";
        }, 50);

    }, 800);
}



// CONTADOR
let inicioFecha = new Date("2025-11-02"); // CAMBIA AQUÍ

function actualizarContador() {
    let ahora = new Date();
    let diff = ahora - inicioFecha;

    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    let horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    let minutos = Math.floor((diff / (1000 * 60)) % 60);
    let segundos = Math.floor((diff / 1000) % 60);

    document.getElementById("contador").innerText =
        `Mi amor por ti comenzó hace...
        ${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
}

setInterval(actualizarContador, 1000);

</script>

</body>
</html>
